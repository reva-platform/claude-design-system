<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  body{margin:0;padding:20px 22px;background:var(--reva-porcelain);color:var(--olive-900);font-family:var(--font-sans)}
  .row{display:grid;grid-template-columns:80px 1fr 60px;gap:14px;align-items:center;padding:5px 0}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--olive-700)}
  .bar{height:14px;background:var(--amber-600);border-radius:2px}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--olive-500);text-align:right}
</style></head><body>
<div class="row"><span class="lbl">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
<div class="row"><span class="lbl">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
<div class="row"><span class="lbl">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
<div class="row"><span class="lbl">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
<div class="row"><span class="lbl">--space-6</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
<div class="row"><span class="lbl">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
<div class="row"><span class="lbl">--space-12</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
<div class="row"><span class="lbl">--space-16</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
<div class="row"><span class="lbl">--space-24</span><div class="bar" style="width:96px"></div><span class="px">96</span></div>
</body></html>
