<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Symbol &amp; Mesh</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  body{margin:0;padding:18px;background:var(--reva-porcelain);font-family:var(--font-sans);color:var(--olive-900);display:grid;grid-template-columns:200px 1fr 1fr;gap:14px;align-items:stretch}

<div class="tile glass"><img src="../assets/reva-glass-symbol.png" alt="Glass symbol"></div>
<div class="tile" style="background-image:url(../assets/mesh/a-01.jpg)"></div>
<div class="tile" style="background-image:url(../assets/mesh/b-05.jpg)"></div>
