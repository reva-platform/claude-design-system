<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;padding:24px;background:var(--reva-porcelain);color:var(--fg);font-family:var(--font-sans)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .badge{display:inline-flex;align-items:center;gap:6px;height:20px;padding:0 8px;font-size:11px;font-weight:500;letter-spacing:.01em;border-radius:9999px;border:1px solid transparent;line-height:1}
  .b-default{background:var(--amber-600);color:#fff}
  .b-secondary{background:color-mix(in oklch,var(--amber-500) 10%,transparent);color:var(--amber-700)}
  .b-outline{background:transparent;border-color:var(--hay-200);color:var(--olive-700)}
  .b-success{background:color-mix(in oklch,var(--fern-500) 10%,transparent);color:var(--fern-700)}
  .b-destructive{background:color-mix(in oklch,var(--mulberry-500) 10%,transparent);color:var(--mulberry-700)}
  .b-info{background:color-mix(in oklch,var(--cobalt-500) 10%,transparent);color:var(--cobalt-700)}
  .dot{width:6px;height:6px;border-radius:50%;flex:none}
  .d-amber{background:var(--amber-600)}
  .d-fern{background:var(--fern-500)}
  .d-mulberry{background:var(--mulberry-500)}
  .d-cobalt{background:var(--cobalt-500)}
  .d-olive{background:var(--olive-500)}
  .d-hay{background:var(--hay-400,#c9c2a8)}
  .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive-500);width:100px}
</style></head><body>
<div class="row"><span class="lbl">Variants</span>
  <span class="badge b-default">Default</span>
  <span class="badge b-secondary">Secondary</span>
  <span class="badge b-outline">Outline</span>
  <span class="badge b-success">Funded</span>
  <span class="badge b-destructive">Failed</span>
  <span class="badge b-info">FX</span>
</div>
<div class="row"><span class="lbl">Status dots</span>
  <span class="badge b-outline"><span class="dot d-fern"></span>Active</span>
  <span class="badge b-outline"><span class="dot d-amber"></span>Pending</span>
  <span class="badge b-outline"><span class="dot d-cobalt"></span>In review</span>
  <span class="badge b-outline"><span class="dot d-mulberry"></span>Blocked</span>
  <span class="badge b-outline"><span class="dot d-hay"></span>Draft</span>
  <span class="badge b-outline"><span class="dot d-olive"></span>Archived</span>
</div>
</body></html>
