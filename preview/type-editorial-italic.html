<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Editorial italic</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  body{margin:0;padding:24px 28px;background:var(--reva-soft-linen);color:var(--olive-900);font-family:var(--font-sans)}
  .quote{font-family:var(--font-heading);font-weight:500;font-size:32px;line-height:1.2;letter-spacing:-.01em;margin:0;max-width:620px}
  .quote em{font-family:var(--font-brand);font-style:italic;font-weight:400;color:var(--olive-500)}
  .meta{margin-top:14px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive-500)}
</style></head><body>
<p class="quote"><em>We believe</em> the best advisors shouldn't have to choose between growing their firm and delivering exceptional client outcomes.</p>
<div class="meta">Playfair Display Italic · brand voice · used 1–2× per page</div>
</body></html>
