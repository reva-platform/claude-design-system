<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  body{margin:0;padding:22px;background:var(--reva-porcelain);color:var(--olive-900);font-family:var(--font-sans)}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
  .swatch{aspect-ratio:1;background:var(--reva-eggshell);border:1px solid var(--hay-200);display:flex;align-items:flex-end;padding:8px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--olive-500)}
</style></head><body>
<div class="row">
  <div class="swatch" style="border-radius:2px"><div class="lbl">xs · 2</div></div>
  <div class="swatch" style="border-radius:4px"><div class="lbl">sm · 4</div></div>
  <div class="swatch" style="border-radius:6px"><div class="lbl">md · 6</div></div>
  <div class="swatch" style="border-radius:8px"><div class="lbl">lg · 8</div></div>
  <div class="swatch" style="border-radius:12px"><div class="lbl">xl · 12</div></div>
  <div class="swatch" style="border-radius:16px"><div class="lbl">2xl · 16</div></div>
  <div class="swatch" style="border-radius:24px"><div class="lbl">3xl · 24</div></div>
  <div class="swatch" style="border-radius:9999px"><div class="lbl">full</div></div>
</div>
</body></html>
