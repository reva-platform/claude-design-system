<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand hues</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  body{margin:0;padding:20px;background:var(--reva-porcelain);font-family:var(--font-sans);color:var(--fg)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{aspect-ratio:1;border-radius:var(--radius-lg);position:relative;overflow:hidden;border:1px solid rgb(0 0 0 / .04)}
  .sw .meta{position:absolute;bottom:8px;left:10px;right:10px;font-size:11px;letter-spacing:.02em;display:flex;justify-content:space-between}
  .sw .name{font-weight:500}
  .light .meta{color:rgb(0 0 0 / .6)}
  .dark  .meta{color:rgb(255 255 255 / .85)}
</style></head><body>
<div class="row">
  <div class="sw dark"  style="background:#AB6400"><div class="meta"><span class="name">Amber</span><span>#AB6400</span></div></div>
  <div class="sw dark"  style="background:#E2A336"><div class="meta"><span class="name">Gold</span><span>#E2A336</span></div></div>
  <div class="sw dark"  style="background:#8A7D42"><div class="meta"><span class="name">Olive</span><span>#8A7D42</span></div></div>
  <div class="sw dark"  style="background:#460815"><div class="meta"><span class="name">Burgundy</span><span>#460815</span></div></div>
  <div class="sw dark"  style="background:#195257"><div class="meta"><span class="name">Deep Teal</span><span>#195257</span></div></div>
  <div class="sw dark"  style="background:#180207"><div class="meta"><span class="name">Coffee Bean</span><span>#180207</span></div></div>
</div>
</body></html>
