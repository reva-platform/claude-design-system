<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;padding:24px;background:var(--reva-porcelain);color:var(--fg);font-family:var(--font-sans)}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .btn{display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-sans);font-weight:500;line-height:1;letter-spacing:.01em;text-decoration:none;border:1px solid transparent;cursor:pointer;transition:background-color .15s ease,border-color .15s ease;border-radius:var(--radius-lg)}
  .btn--primary{background:var(--amber-600);color:#fff}
  .btn--primary:hover{background:var(--amber-700)}
  .btn--secondary{background:var(--hay-100);color:var(--hay-600)}
  .btn--secondary:hover{background:var(--hay-150)}
  .btn--outline{background:transparent;color:var(--olive-900);border-color:var(--hay-200)}
  .btn--outline:hover{background:color-mix(in oklch, var(--hay-300) 25%, transparent)}
  .btn--ghost{background:transparent;color:var(--olive-700)}
  .btn--ghost:hover{background:color-mix(in oklch, var(--olive-500) 8%, transparent)}
  .btn--destructive{background:color-mix(in oklch, var(--mulberry-500) 12%, transparent);color:var(--destructive)}
  .btn--destructive:hover{background:color-mix(in oklch, var(--mulberry-500) 18%, transparent)}
  .btn--link{background:transparent;color:var(--amber-700);padding:0;border:0;border-radius:0}
  .btn--link:hover{text-decoration:underline}
  .btn--xs{min-height:26px;font-size:12px;padding:0 10px;border-radius:8px}
  .btn--sm{min-height:32px;font-size:13px;padding:0 12px;border-radius:8px}
  .btn--md{min-height:38px;font-size:14px;padding:0 16px}
  .btn--lg{min-height:46px;font-size:16px;padding:0 22px}
  .btn--link.btn--xs,.btn--link.btn--sm,.btn--link.btn--md,.btn--link.btn--lg{min-height:auto;padding:0}
  .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive-500);width:90px}
</style></head><body>
<div class="row"><span class="lbl">Variants</span>
  <a class="btn btn--primary btn--md">Default</a>
  <a class="btn btn--secondary btn--md">Secondary</a>
  <a class="btn btn--outline btn--md">Outline</a>
  <a class="btn btn--ghost btn--md">Ghost</a>
  <a class="btn btn--destructive btn--md">Destructive</a>
  <a class="btn btn--link btn--md">Link</a>
</div>
<div class="row"><span class="lbl">Sizes</span>
  <a class="btn btn--primary btn--xs">Extra Small</a>
  <a class="btn btn--primary btn--sm">Small</a>
  <a class="btn btn--primary btn--md">Default</a>
  <a class="btn btn--primary btn--lg">Large</a>
</div>
</body></html>
