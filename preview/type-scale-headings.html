<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428">
<style>
  body{margin:0;padding:20px 24px;background:var(--reva-porcelain);color:var(--olive-900);font-family:var(--font-sans)}
  .row{display:grid;grid-template-columns:88px 1fr 110px;gap:16px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--hay-200)}
  .row:last-child{border-bottom:0}
  .label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive-500)}
  .sample{font-family:var(--font-heading);font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--olive-900)}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--olive-500);text-align:right}
</style></head><body>
<div class="row"><div class="label">H1 / Display</div><div class="sample" style="font-size:48px;letter-spacing:-.02em">Modern advice</div><div class="px">48 / 50</div></div>
<div class="row"><div class="label">H2</div><div class="sample" style="font-size:36px;letter-spacing:-.02em">Modern advice</div><div class="px">36 / 40</div></div>
<div class="row"><div class="label">H3</div><div class="sample" style="font-size:28px">Modern advice</div><div class="px">28 / 32</div></div>
<div class="row"><div class="label">H4</div><div class="sample" style="font-size:22px;font-weight:600">Modern advice</div><div class="px">22 / 28</div></div>
<div class="row"><div class="label">H5</div><div class="sample" style="font-size:18px;font-weight:600">Modern advice</div><div class="px">18 / 24</div></div>
<div class="row"><div class="label">H6</div><div class="sample" style="font-size:16px;font-weight:600">Modern advice</div><div class="px">16 / 22</div></div>
</body></html>
