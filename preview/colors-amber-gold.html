<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Amber &amp; Gold scales</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428b">
<style>
  body{margin:0;padding:18px;background:var(--reva-porcelain);font-family:var(--font-sans);color:var(--fg)}
  .row{display:grid;grid-template-columns:repeat(19,1fr);gap:3px;margin-bottom:14px}
  .sw{height:72px;border-radius:6px;display:flex;align-items:flex-end;padding:5px;font-size:10px;font-family:var(--font-mono)}
  .lo{color:rgba(0,0,0,.55)}.hi{color:rgba(255,255,255,.85)}
  .label{font-family:var(--font-sans);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive-500);margin:0 0 6px}
  .star{margin-left:4px;opacity:.85}
</style></head><body>

<div class="label">Amber — primary action (★ 600 = brand amber)</div>
<div class="row">
  <div class="sw lo" style="background:var(--amber-50)">50</div>
  <div class="sw lo" style="background:var(--amber-100)">100</div>
  <div class="sw lo" style="background:var(--amber-150)">150</div>
  <div class="sw lo" style="background:var(--amber-200)">200</div>
  <div class="sw lo" style="background:var(--amber-250)">250</div>
  <div class="sw lo" style="background:var(--amber-300)">300</div>
  <div class="sw lo" style="background:var(--amber-350)">350</div>
  <div class="sw lo" style="background:var(--amber-400)">400</div>
  <div class="sw lo" style="background:var(--amber-450)">450</div>
  <div class="sw hi" style="background:var(--amber-500)">500</div>
  <div class="sw hi" style="background:var(--amber-550)">550</div>
  <div class="sw hi" style="background:var(--amber-600)">600<span class="star">★</span></div>
  <div class="sw hi" style="background:var(--amber-650)">650</div>
  <div class="sw hi" style="background:var(--amber-700)">700</div>
  <div class="sw hi" style="background:var(--amber-750)">750</div>
  <div class="sw hi" style="background:var(--amber-800)">800</div>
  <div class="sw hi" style="background:var(--amber-850)">850</div>
  <div class="sw hi" style="background:var(--amber-900)">900</div>
  <div class="sw hi" style="background:var(--amber-950)">950</div>
</div>

<div class="label">Gold — focus ring, logo marks, highlights (★ 500 = brand gold)</div>
<div class="row">
  <div class="sw lo" style="background:var(--gold-50)">50</div>
  <div class="sw lo" style="background:var(--gold-100)">100</div>
  <div class="sw lo" style="background:var(--gold-150)">150</div>
  <div class="sw lo" style="background:var(--gold-200)">200</div>
  <div class="sw lo" style="background:var(--gold-250)">250</div>
  <div class="sw lo" style="background:var(--gold-300)">300</div>
  <div class="sw lo" style="background:var(--gold-350)">350</div>
  <div class="sw lo" style="background:var(--gold-400)">400</div>
  <div class="sw lo" style="background:var(--gold-450)">450</div>
  <div class="sw lo" style="background:var(--gold-500)">500<span class="star">★</span></div>
  <div class="sw hi" style="background:var(--gold-550)">550</div>
  <div class="sw hi" style="background:var(--gold-600)">600</div>
  <div class="sw hi" style="background:var(--gold-650)">650</div>
  <div class="sw hi" style="background:var(--gold-700)">700</div>
  <div class="sw hi" style="background:var(--gold-750)">750</div>
  <div class="sw hi" style="background:var(--gold-800)">800</div>
  <div class="sw hi" style="background:var(--gold-850)">850</div>
  <div class="sw hi" style="background:var(--gold-900)">900</div>
  <div class="sw hi" style="background:var(--gold-950)">950</div>
</div>

</body></html>
