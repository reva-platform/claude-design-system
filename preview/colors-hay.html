<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Hay scale</title>
<link rel="stylesheet" href="../colors_and_type.css?v=20260428a">
<style>
  body{margin:0;padding:20px;background:var(--reva-porcelain);font-family:var(--font-sans);color:var(--fg)}
  .row{display:grid;grid-template-columns:repeat(19,1fr);gap:3px}
  .sw{height:96px;border-radius:6px;position:relative;display:flex;align-items:flex-end;padding:6px;font-size:10px;font-family:var(--font-mono)}
  .lo{color:rgba(0,0,0,.55)}.hi{color:rgba(255,255,255,.85)}
  .label{font-family:var(--font-sans);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive-500);margin:0 0 8px}
  .star{margin-left:4px;opacity:.85}
</style></head><body>
<div class="label">Hay — warm tinted neutral (default app surface ramp · 19 steps)</div>
<div class="row">
  <div class="sw lo" style="background:var(--hay-50)">50</div>
  <div class="sw lo" style="background:var(--hay-100)">100</div>
  <div class="sw lo" style="background:var(--hay-150)">150</div>
  <div class="sw lo" style="background:var(--hay-200)">200</div>
  <div class="sw lo" style="background:var(--hay-250)">250</div>
  <div class="sw lo" style="background:var(--hay-300)">300</div>
  <div class="sw lo" style="background:var(--hay-350)">350</div>
  <div class="sw lo" style="background:var(--hay-400)">400</div>
  <div class="sw lo" style="background:var(--hay-450)">450</div>
  <div class="sw hi" style="background:var(--hay-500)">500<span class="star">★</span></div>
  <div class="sw hi" style="background:var(--hay-550)">550</div>
  <div class="sw hi" style="background:var(--hay-600)">600</div>
  <div class="sw hi" style="background:var(--hay-650)">650</div>
  <div class="sw hi" style="background:var(--hay-700)">700</div>
  <div class="sw hi" style="background:var(--hay-750)">750</div>
  <div class="sw hi" style="background:var(--hay-800)">800</div>
  <div class="sw hi" style="background:var(--hay-850)">850</div>
  <div class="sw hi" style="background:var(--hay-900)">900</div>
  <div class="sw hi" style="background:var(--hay-950)">950</div>
</div>
</body></html>
